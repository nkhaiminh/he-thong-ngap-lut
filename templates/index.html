<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quan Trắc Ngập Lụt Đô Thị</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .station-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .val-text { font-size: 2.8rem; font-weight: 700; color: #2c3e50; }
        canvas { max-height: 220px; width: 100%; margin-top: 15px; }
        .conn-badge { font-size: 0.85rem; padding: 5px 10px; }
        .ai-pred-text { color: #d35400; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4 shadow">
        <div class="container justify-content-center">
            <span class="navbar-brand mb-0 fs-5 text-wrap text-center fw-bold">HỆ THỐNG QUAN TRẮC VÀ ĐIỀU KHIỂN NGẬP LỤT ĐÔ THỊ</span>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row" id="dashboard"></div>
    </div>

    <script>
        const stations = ['tuyen1', 'tuyen2', 'tuyen3'];
        const charts = {};

        // Khởi tạo giao diện
        stations.forEach((id, index) => {
            const html = `
                <div class="col-lg-4">
                    <div class="station-card">
                        <div class="d-flex justify-content-between align-items-center border-bottom pb-2">
                            <h4 class="mb-0 text-primary">Tuyến Đường ${index + 1}</h4>
                            <span id="conn-${id}" class="badge bg-secondary conn-badge">Đang kết nối...</span>
                        </div>
                        <div class="text-center mt-3">
                            <div class="val-text"><span id="val-${id}">0</span> <span class="fs-4 text-muted">cm</span></div>
                            <h6 id="level-desc-${id}" class="text-secondary mt-1">Trạng thái: Đang cập nhật</h6>
                            <div class="mt-3 p-2 bg-light rounded text-start">
                                <small class="text-muted d-block">Tác nhân gây ngập:</small>
                                <strong>Cường độ mưa: <span id="rain-${id}" class="text-primary">0</span>%</strong><br>
                                <strong> Dự báo (T+5): <span id="pred-${id}" class="ai-pred-text">0</span> cm</strong>
                            </div>
                        </div>
                        <canvas id="chart-${id}"></canvas>
                        <div class="mt-4 pt-3 border-top text-center">
                            <p class="mb-2">Chế độ Rào: <b id="barrier-${id}" class="text-info">Tự động</b></p>
                            <div class="btn-group w-100">
                                <button class="btn btn-danger" onclick="sendCtrl('${id}', 'ON')">Đóng</button>
                                <button class="btn btn-success" onclick="sendCtrl('${id}', 'OFF')">Mở</button>
                                <button class="btn btn-secondary" onclick="sendCtrl('${id}', 'AUTO')">Auto</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            document.getElementById('dashboard').innerHTML += html;

            // Khởi tạo biểu đồ
            const ctx = document.getElementById(`chart-${id}`).getContext('2d');
            charts[id] = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'Mực nước (cm)', data: [], borderColor: '#3498db', borderWidth: 2, fill: true, tension: 0.4 }] },
                options: { animation: false, scales: { y: { beginAtZero: true, max: 20 } } }
            });
        });

        function updateUI() {
            fetch('/api/update?_t=' + new Date().getTime(), { cache: 'no-store' })
                .then(r => r.json())
                .then(data => {
                    stations.forEach(id => {
                        const info = data[id];
                        const val = info.val;
                        
                        document.getElementById(`val-${id}`).innerText = val;
                        document.getElementById(`rain-${id}`).innerText = info.rain_percent;
                        document.getElementById(`pred-${id}`).innerText = info.pred;
                        document.getElementById(`barrier-${id}`).innerText = info.barrier;

                        // Cập nhật mô tả trạng thái
                        const descElem = document.getElementById(`level-desc-${id}`);
                        if (val < 1) descElem.innerHTML = "<span class='text-success'>An toàn</span>";
                        else if (val <= 3) descElem.innerHTML = "<span class='text-primary'>Ngập nhẹ (Đèn 1)</span>";
                        else if (val <= 6) descElem.innerHTML = "<span class='text-warning'>Ngập vừa (Đèn 2)</span>";
                        else descElem.innerHTML = "<span class='text-danger fw-bold'>Ngập Nặng (Hạ rào)</span>";

                        // Cập nhật kết nối
                        const connElem = document.getElementById(`conn-${id}`);
                        connElem.innerText = info.status_conn;
                        connElem.className = info.status_conn === "Trực tuyến" ? "badge bg-success conn-badge" : "badge bg-danger conn-badge";

                        // Cập nhật biểu đồ
                        if (info.status_conn === "Trực tuyến") {
                            const now = new Date().toLocaleTimeString('vi-VN', { hour12: false });
                            const chart = charts[id];
                            chart.data.labels.push(now);
                            chart.data.datasets[0].data.push(val);
                            if(chart.data.labels.length > 20) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
                            chart.update();
                        }
                    });
                });
        }

        function sendCtrl(id, act) {
            fetch('/api/control', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({tuyen: id, action: act}) });
        }

        setInterval(updateUI, 2000);
    </script>
</body>
</html>
